packages:
  - 'packages/*'
  - 'apps/*'
allowBuilds:
  '@ffprobe-installer/darwin-arm64': true
  '@ffprobe-installer/linux-arm64': true
  '@ffprobe-installer/linux-x64': true
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  ffmpeg-static: true
  prisma: true
minimumReleaseAgeExclude:
  - '@expo/cli@57.0.3'
  - '@expo/fingerprint@0.20.1'
  - '@expo/inline-modules@0.1.1'
  - '@expo/local-build-cache-provider@57.0.1'
  - '@expo/metro-config@57.0.2'
  - '@expo/prebuild-config@57.0.3'
  - '@expo/router-server@57.0.1'
  - babel-preset-expo@57.0.1
  - expo-asset@57.0.2
  - expo-constants@57.0.2
  - expo-modules-autolinking@57.0.3
  - expo-modules-core@57.0.1
  - expo@57.0.1
